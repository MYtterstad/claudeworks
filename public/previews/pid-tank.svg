<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="waterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="tankGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#4b5563;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="400" height="240" fill="#1c1f2e"/>

  <!-- Tank container (rectangular with rounded bottom) -->
  <g>
    <!-- Tank outline -->
    <path d="M 50 50 L 50 140 Q 50 160 70 160 L 140 160 Q 160 160 160 140 L 160 50 Z"
          fill="none" stroke="#6b7280" stroke-width="2" opacity="0.8"/>

    <!-- Tank background fill (subtle) -->
    <path d="M 50 50 L 50 140 Q 50 160 70 160 L 140 160 Q 160 160 160 140 L 160 50 Z"
          fill="#111827" stroke="none"/>

    <!-- Water level in tank -->
    <path d="M 52 110 L 52 140 Q 52 158 70 158 L 140 158 Q 158 158 158 140 L 158 110 Z"
          fill="url(#waterGradient)" stroke="none"/>

    <!-- Water surface highlight -->
    <ellipse cx="105" cy="110" rx="52" ry="4" fill="#60a5fa" opacity="0.3"/>
  </g>

  <!-- Setpoint line (dashed horizontal) -->
  <line x1="50" y1="85" x2="160" y2="85"
        stroke="#a78bfa" stroke-width="2" stroke-dasharray="4,3" opacity="0.8"/>
  <circle cx="45" cy="85" r="2.5" fill="#a78bfa" opacity="0.8"/>

  <!-- Control elements (sliders hint) -->
  <g>
    <!-- Left slider track 1 -->
    <rect x="30" y="175" width="50" height="3" fill="#4b5563" rx="1.5"/>
    <circle cx="45" cy="176.5" r="4" fill="#60a5fa" opacity="0.7"/>

    <!-- Left slider track 2 -->
    <rect x="30" y="195" width="50" height="3" fill="#4b5563" rx="1.5"/>
    <circle cx="58" cy="196.5" r="4" fill="#a78bfa" opacity="0.7"/>
  </g>

  <!-- Chart/Graph area on the right -->
  <g>
    <!-- Chart background -->
    <rect x="185" y="45" width="155" height="135" fill="#111827" stroke="#374151" stroke-width="1" opacity="0.6" rx="4"/>

    <!-- Chart grid lines -->
    <line x1="185" y1="77.5" x2="340" y2="77.5" stroke="#4b5563" stroke-width="0.5" opacity="0.4"/>
    <line x1="185" y1="110" x2="340" y2="110" stroke="#4b5563" stroke-width="0.5" opacity="0.4"/>
    <line x1="185" y1="142.5" x2="340" y2="142.5" stroke="#4b5563" stroke-width="0.5" opacity="0.4"/>

    <!-- Setpoint reference line on chart -->
    <line x1="185" y1="110" x2="340" y2="110" stroke="#a78bfa" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,2"/>

    <!-- Control signal oscillation curve (converging to setpoint) -->
    <path d="M 190 85 Q 205 70 220 90 Q 235 110 250 105 Q 265 102 280 108 Q 295 112 310 109 Q 325 108 335 109"
          fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

    <!-- Vertical axis label area -->
    <text x="172" y="115" font-size="9" fill="#9ca3af" opacity="0.7" text-anchor="end">Set</text>
  </g>

  <!-- Labels/Icons -->
  <g>
    <!-- Tank label -->
    <text x="105" y="25" font-size="13" font-weight="600" fill="#e5e7eb" text-anchor="middle">PID Tank</text>

    <!-- Status indicator -->
    <circle cx="375" cy="60" r="3.5" fill="#10b981" opacity="0.8"/>
    <circle cx="375" cy="60" r="2.5" fill="#10b981" opacity="0.5" animation="pulse"/>
  </g>

  <!-- Subtle accent corners -->
  <rect x="185" y="45" width="155" height="135" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.15" rx="4"/>
</svg>
<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="240" fill="#1c1f2e"/>

  <!-- Red route (main solution path) -->
  <polyline points="60,50 120,80 180,40 240,100 300,70 320,140 260,180 140,160 80,120 60,50"
            fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Blue dashed route (alternative/optimization hint) -->
  <polyline points="60,50 140,160 260,180 300,70 120,80 60,50"
            fill="none" stroke="#60a5fa" stroke-width="2" stroke-dasharray="5,4"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Cities - regular nodes -->
  <circle cx="120" cy="80" r="5" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="180" cy="40" r="5" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="240" cy="100" r="5" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="300" cy="70" r="5" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="320" cy="140" r="5" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="260" cy="180" r="5" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="140" cy="160" r="5" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="80" cy="120" r="5" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="200" cy="200" r="5" fill="none" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Start city - highlighted -->
  <circle cx="60" cy="50" r="7" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="60" cy="50" r="3" fill="#1c1f2e" stroke="none"/>
  <circle cx="60" cy="50" r="2.5" fill="#fbbf24"/>

  <!-- Subtle accent circle in corner -->
  <circle cx="370" cy="25" r="15" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.3"/>
</svg>